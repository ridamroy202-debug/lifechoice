name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: lifechoice-ai-engine
  DOCKERHUB_IMAGE: softvence/lifechoice-ai-engine

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run test suite
        env:
          RUBRIC_ADMIN_KEY: test-admin-key
          AI_ENGINE_DB_PATH: ${{ github.workspace }}/data/test_engine.db
        run: python -m unittest tests/test_engine_flow.py -v

  docker:
    name: Build and Publish Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy latest image over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_APP_PORT: ${{ secrets.EC2_APP_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST}" ] || [ -z "${EC2_USER}" ] || [ -z "${EC2_SSH_KEY}" ]; then
            echo "Missing one or more required EC2 secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY" >&2
            exit 1
          fi

          SSH_PORT="${EC2_PORT:-22}"
          APP_PORT="${EC2_APP_PORT:-8000}"

          mkdir -p ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/lifechoice_ec2_key
          chmod 600 ~/.ssh/lifechoice_ec2_key
          ssh-keyscan -p "${SSH_PORT}" "${EC2_HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/lifechoice_ec2_key -p "${SSH_PORT}" "${EC2_USER}@${EC2_HOST}" \
            "DOCKERHUB_IMAGE='${DOCKERHUB_IMAGE}:latest' CONTAINER_NAME='${IMAGE_NAME}' APP_PORT='${APP_PORT}' bash -s" <<'REMOTE'
          set -euo pipefail

          ENV_FILE_ARG=""
          if [ -f "$HOME/lifechoice-ai-engine.env" ]; then
            ENV_FILE_ARG="--env-file $HOME/lifechoice-ai-engine.env"
          fi

          DOCKER="docker"
          if ! docker ps >/dev/null 2>&1; then
            DOCKER="sudo docker"
          fi

          $DOCKER pull "$DOCKERHUB_IMAGE"

          if $DOCKER ps -a --format '{{.Names}}' | grep -Fx "$CONTAINER_NAME" >/dev/null; then
            $DOCKER stop "$CONTAINER_NAME" || true
            $DOCKER rm "$CONTAINER_NAME" || true
          fi

          $DOCKER volume create lifechoice-ai-engine-data >/dev/null
          $DOCKER volume create lifechoice-ai-engine-certificates >/dev/null

          $DOCKER run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$APP_PORT:8000" \
            $ENV_FILE_ARG \
            -v lifechoice-ai-engine-data:/app/data \
            -v lifechoice-ai-engine-certificates:/app/generated_certificates \
            "$DOCKERHUB_IMAGE"

          for attempt in $(seq 1 30); do
            if [ "$($DOCKER inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null || echo false)" != "true" ]; then
              echo "Container stopped before becoming healthy." >&2
              $DOCKER logs "$CONTAINER_NAME" || true
              exit 1
            fi

            if curl --fail --silent --show-error "http://127.0.0.1:$APP_PORT/openapi.json" >/dev/null; then
              echo "Deployment health check passed."
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Container did not become healthy after 60 seconds." >&2
              $DOCKER ps -a --filter "name=$CONTAINER_NAME"
              $DOCKER logs "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

          $DOCKER image prune -f
          REMOTE
