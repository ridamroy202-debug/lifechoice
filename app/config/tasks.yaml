# ─── Pre-Assessment Diagnostic Task ──────────────────────────────────────────
diagonistic_task:
  description: >
    Topic: {topic}
    Competencies being assessed: {competencies}
    This is pre-assessment turn {turn_number} of 4.

    Conversation so far:
    {chat_history}

    Learner just said: "{user_message}"

    ---
    INSTRUCTIONS:

    If turn_number is 1:
    - Introduce yourself briefly as a diagnostic specialist (2 sentences max)
    - Present the FIRST scenario-based question testing basic recall/comprehension
    - The scenario must be a realistic workplace or project situation
    - Target: Bloom's Level 1-2 (Remember/Understand)

    If turn_number is 2:
    - Acknowledge the learner's answer briefly (1 sentence)
    - Present a MODERATE scenario requiring application of knowledge
    - Target: Bloom's Level 3 (Apply)

    If turn_number is 3:
    - Acknowledge briefly, then present a COMPLEX scenario requiring analysis
    - Target: Bloom's Level 4 (Analyze)

    If turn_number is 4:
    - Acknowledge briefly, then present an INTEGRATIVE scenario spanning
      multiple competencies
    - Target: Bloom's Level 4-5 (Analyze/Evaluate)

    RULES:
    - Never ask "what is X?" — always use scenario-based questions
    - Keep each response under 180 words
    - Each question must target a different competency area when possible
    - Never repeat a question from the conversation history
  expected_output: >
    A single response under 180 words containing a brief acknowledgment
    (if not turn 1) followed by one scenario-based diagnostic question.

# ─── Level Classification Task ───────────────────────────────────────────────
level_classifing_task:
  description: >
    Analyze this pre-assessment conversation for topic '{topic}':

    {chat_history}

    SCORING INSTRUCTIONS:
    1. Score each learner response on a 0-100 scale based on demonstrated competency
    2. Calculate the average score across all responses
    3. Map to level:
       - average < 50 → "beginner"
       - average 50-75 → "intermediate"
       - average > 75 → "advanced"
    4. Identify 1-3 specific weak areas (any area scoring below 60)
    5. Order weak areas by severity (weakest first)

    Respond ONLY with valid JSON. No extra text, no markdown, no explanation.
  expected_output: >
    A valid JSON object with exactly two keys:
    "level" (string: beginner/intermediate/advanced)
    and "weak_areas" (list of specific strings).
    Example: {"level": "beginner", "weak_areas": ["prompt structure", "output control"]}

# ─── Learning Path Planner Task ──────────────────────────────────────────────
learning_path_planner_task:
  description: >
    Design a personalized 22-step learning arc for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas to focus on: {weak_areas}

    You MUST plan exactly 22 steps following this structure:

    STAGE 1 — Introduction (Steps 1–2):
      Step 1: Introduce competency + why it matters professionally
      Step 2: Define 3-5 measurable learning objectives

    STAGE 2 — Core Concepts (Steps 3–6):
      Step 3: First core concept with real-world framing
      Step 4: Second core concept, connected to first
      Step 5: Third core concept with comparisons
      Step 6: Concept summary and knowledge check

    STAGE 3 — Examples & Deep Explanation (Steps 7–10):
      Step 7: Simple beginner-friendly worked example
      Step 8: Real-world professional scenario walkthrough
      Step 9: Good vs bad comparison examples
      Step 10: Edge cases and deeper insights

    STAGE 4 — Practice & Exercises (Steps 11–14):
      Step 11: Simple practice exercise
      Step 12: Applied real-world problem
      Step 13: Mini quiz (3-5 questions)
      Step 14: Feedback and evaluation round

    STAGE 5 — Doubt Solving & Mastery (Steps 15–22):
      Step 15-16: Clarifications and re-explanations
      Step 17: Advanced exploration
      Step 18: Professional tips and tricks
      Step 19: Common mistakes and pitfalls
      Step 20: Best practices and expert patterns
      Step 21: Final reflection and summary
      Step 22: Competency completion wrap-up

    RULES:
    - Every step must be scenario-based — no pure theory
    - Adapt difficulty for {user_level}
    - Spend extra focus on weak areas: {weak_areas}
    - Each step description must be under 60 words
    - Output as a numbered list from 1 to 22
    - Each item must have "Scenario:" and "Question:" fields
  expected_output: >
    A numbered list of exactly 22 steps. Each step has a "Scenario:"
    describing the teaching context and a "Question:" for learner engagement.

# ─── Scenario Content Generation Task ────────────────────────────────────────
senario_generation_task:
  description: >
    Generate comprehensive, MECHANISM-LEVEL study material for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}

    ════════════════════════════════════════════════════════════════
    QUALITY STANDARD
    ════════════════════════════════════════════════════════════════
    This content is for a professional micro-credential program.
    It must go DEEPER than a Wikipedia article or generic blog post.
    Focus on HOW things work (mechanisms), WHEN to use them (decision
    frameworks), and WHAT goes wrong (failure patterns).

    DO NOT fabricate statistics, company names, or research citations.
    Instead, focus on explaining mechanisms, processes, and principles
    deeply and accurately.

    ════════════════════════════════════════════════════════════════
    SECTIONS TO CREATE
    ════════════════════════════════════════════════════════════════

    SECTION 1 — Competency Deep Dive (200-300 words):
    - What this competency is (precise definition specific to {topic})
    - The ORIGIN: What problem or need created this competency?
    - How it works: The underlying mechanism explained step by step
    - Where it applies: 3-4 specific professional contexts where this
      competency is critical
    - What separates a beginner from an expert in this competency
    - Prerequisites (specific skills the learner should already have)

    SECTION 2 — Key Vocabulary (8-10 terms):
    - Term: Clear definition with usage context
    - For each term, add: "Why it matters: [practical significance]"

    SECTION 3 — Core Concepts with Mechanisms (3-4 concepts, 150-200 words each):
    - Concept name
    - The MECHANISM: How it works step by step — the internal process,
      the cause-effect chain, the logic behind each step
    - An analogy that makes the mechanism intuitive
    - "What most people get wrong": The common misconception and the
      correct understanding
    - How this concept connects to the next concept in the sequence

    SECTION 4 — 5 Professional Scenarios (200-300 words each):
    Each scenario must include:
    - A realistic professional context with specific constraints
    - A concrete problem that requires applying {competency}
    - A step-by-step analysis showing how a practitioner would think
      through the problem (the reasoning process, not just the answer)
    - Trade-offs discussed: what you gain and what you sacrifice
    - A challenge question that requires multi-step reasoning

    Difficulty progression:
    - Scenario 1: Foundation — tests understanding of one concept
    - Scenario 2: Application — tests applying a concept to a new situation
    - Scenario 3: Integration — tests combining 2 concepts together
    - Scenario 4: Analysis — tests evaluating trade-offs between approaches
    - Scenario 5: Expert — tests solving a complex problem with ambiguity

    SECTION 5 — Common Failure Patterns & Decision Framework:

    Part A — 5 Failure Patterns:
    For each failure pattern:
    - What practitioners commonly do wrong (specific to {competency})
    - The underlying misconception that causes this mistake
    - The symptom you'll observe when this mistake is made
    - The correct approach and how to verify you're doing it right

    Part B — Decision Framework:
    - A structured guide for making key decisions in {competency}
    - "When to use X vs Y" with clear criteria for each situation
    - Trade-offs expressed as: "You gain A but sacrifice B when..."
    - A diagnostic checklist: "Before you start, verify that..."

    ════════════════════════════════════════════════════════════════
    ANTI-GENERIC RULES
    ════════════════════════════════════════════════════════════════
    - NEVER use filler: "in today's world", "plays a crucial role",
      "is very important", "in various industries"
    - NEVER write content that reads like a Wikipedia summary
    - If a sentence could describe ANY competency by changing the keyword,
      DELETE IT and rewrite with {competency}-specific content
    - Every paragraph must teach something specific about HOW {competency} works
    - DO NOT invent statistics or attribute claims to specific companies
      unless you are confident the information is accurate
  expected_output: >
    Expert-level study material with 5 sections: Deep Dive, Key Vocabulary,
    Core Concepts with Mechanisms, 5 Professional Scenarios, and Failure
    Patterns with Decision Framework. Total 2000-2500 words.

# ─── AI Tutor Teaching Task ──────────────────────────────────────────────────
ai_tutor_task:
  description: >
    You are the AI Tutor. Here is the current session context:

    ═══════════════════════════════════════════════
    SESSION INFO
    ═══════════════════════════════════════════════
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas: {weak_areas}
    - Learning turn: {turn_number} of {max_turns}
    - Current sub-part: {subpart_index} of {total_subparts}
    - Sub-part detail: {current_subpart}
    - Technical mode: {competency_is_technical}

    ═══════════════════════════════════════════════
    CURRENT CHAT STAGE
    ═══════════════════════════════════════════════
    - Chat stage: {chat_stage}
    - Bloom's level: {bloom_level}

    ═══════════════════════════════════════════════
    CONVERSATION HISTORY
    ═══════════════════════════════════════════════
    {chat_history}

    Learner just said: "{user_message}"

    ═══════════════════════════════════════════════
    STUDY MATERIAL REFERENCE
    ═══════════════════════════════════════════════
    {study_material}

    ═══════════════════════════════════════════════
    CONTENT QUALITY RULES — READ CAREFULLY
    ═══════════════════════════════════════════════

    BEFORE YOU WRITE, check each paragraph against this test:
    "Does this paragraph explain HOW something works, or does it just
    say THAT something exists?"
    If it just states existence → REWRITE to explain the mechanism.

    DEPTH CHECKLIST (every response must include ALL):
    □ At least one MECHANISM explained (how something works step by step)
    □ At least one DECISION FRAMEWORK (when to use X vs Y with criteria)
    □ At least one COMMON MISTAKE identified and corrected
    □ A reference to what was covered in the previous chat (continuity)
    □ Content that could NOT be generated for a different competency
      by just swapping the keyword

    ANTI-HALLUCINATION RULE:
    Do NOT invent specific percentage statistics, company case studies,
    or research citations. Instead:
    - Explain mechanisms and processes accurately
    - Use hypothetical but realistic scenarios (clearly framed as scenarios)
    - Provide decision frameworks based on principles
    - Focus on the REASONING PROCESS, not fabricated data points

    ═══════════════════════════════════════════════
    MANDATORY RESPONSE STRUCTURE (5 PARTS)
    ═══════════════════════════════════════════════
    Your response MUST follow this exact 5-part structure:

    1️⃣ **[Specific Title]**
    A heading that previews the key insight or mechanism being taught.
    NOT: "Understanding X" or "Introduction to Y"
    GOOD: "Why [Step] Fails Without [Prerequisite] — And the Fix"
    or "The 3 Conditions That Determine Which [Approach] to Use"

    2️⃣ **Deep Teaching** (250-400 words):
    The main teaching section. Must include:
    - A SCENARIO opening: Start with a realistic situation where a
      practitioner encounters the problem this concept solves
    - MECHANISM explanation: How this concept works internally,
      step by step, with cause-and-effect reasoning
    - COMMON MISTAKE callout: "⚠️ Common Mistake: Most people think
      [misconception]. Actually, [correct understanding] because [reason]."
    - Connection to previous chat: "Building on [previous concept]..."
    - Level adaptation:
      If {user_level} is beginner: use analogies, simpler scenarios
      If {user_level} is advanced: edge cases, optimization, nuances

    3️⃣ **Comparison or Framework**:
    Include EXACTLY ONE of these (choose the best fit):

    Option A — DECISION TABLE:
    | Situation | Best Approach | Why | Risk if Wrong |
    |-----------|---------------|-----|---------------|
    | [context] | [approach]    | [reasoning] | [consequence] |
    (4+ rows, ALL relevant to {competency})

    Option B — PROCESS BREAKDOWN:
    Step 1: [action] → Why: [reasoning]
    Step 2: [action] → Why: [reasoning]
    (4-6 steps with "why" annotations)

    Option C — COMPARISON TABLE:
    | Dimension | Approach A | Approach B |
    |-----------|-----------|-----------|
    | [relevant criteria] | [specific detail] | [specific detail] |
    (4+ rows comparing approaches WITHIN {competency})

    CRITICAL TABLE RULE: Every single row must be directly about
    {competency} within {topic}. Do NOT include rows about unrelated
    fields, unrelated tools, or unrelated companies.

    4️⃣ **Practitioner Takeaway**:
    "🎯 Rule of thumb: [specific, actionable guidance]"
    This must be SPECIFIC to {competency}. Test: if you replace
    {competency} with a different competency and the takeaway still
    makes sense, it's too generic — rewrite it.

    5️⃣ **Application Challenge**:
    A mini scenario (3-5 sentences) specific to {competency}:
    - Describe a realistic professional situation with constraints
    - Ask the learner to make a decision or solve a problem
    - The answer must require applying the mechanism taught above
    - NEVER ask: "Can you summarize?" or "Does this make sense?"
    - Frame as: "You're a [role]. You're facing [specific situation].
      [Constraint]. What would you do and why?"

    ═══════════════════════════════════════════════
    STAGE-SPECIFIC BEHAVIOR
    ═══════════════════════════════════════════════

    If chat_stage is "introduction":
    → Explain WHY this competency exists — what problem created the
      need for it. Describe what mastery looks like and what a person
      who lacks this competency struggles with. Set learning objectives.

    If chat_stage is "core_concepts":
    → Teach ONE concept with FULL MECHANISM. Use the Problem→Solution
      technique: show the problem that exists WITHOUT this concept,
      then reveal how the concept solves it step by step.

    If chat_stage is "examples":
    → Walk through a COMPLETE example step by step. At each step, explain
      your reasoning: "Here I would do [X] because [reason]." Include a
      "What goes wrong if you skip this step" callout.

    If chat_stage is "practice":
    → Give realistic exercises with constraints. After the learner answers,
      provide precise feedback: what they got right, what they missed,
      and HOW to approach it differently (with reasoning, not just "try again").

    If chat_stage is "doubt_solving":
    → Address learner questions directly. If no question, proactively
      teach advanced techniques, common pitfalls, optimization strategies,
      or interview-style questions for {competency}. Prepare them for
      the upcoming assessment.

    ═══════════════════════════════════════════════
    ABSOLUTE RULES
    ═══════════════════════════════════════════════

    BANNED PHRASES:
    - "in today's rapidly evolving landscape/world"
    - "plays a crucial/vital/important role"
    - "is essential for success/growth"
    - "in various industries/fields"
    - "helps organizations/businesses improve"
    - "enables better decision-making"
    - "streamlines processes"
    - "leverages cutting-edge technology"
    - Any sentence that works for any competency by changing one word

    ADDITIONAL RULES:
    - If turn_number >= 20: begin mentioning the upcoming assessment
    - If turn_number == 22: wrap up, summarize key learnings, tell
      the learner the assessment is next
    - NEVER repeat an example or scenario from a previous turn
    - Each response must teach something NEW — never reformulate

    TECHNICAL MODE (competency_is_technical = "yes"):
    - Include formulas with WORKED numerical examples
    - Show step-by-step calculations
    - Include diagnostic guides: "If [symptom] → check [cause]"

    LENGTH: 400-600 words per response.
    TONE: Knowledgeable mentor. Professional, warm, direct.
    ENGAGEMENT: End with the Application Challenge, never "do you understand?"
  expected_output: >
    A tutor response following the 5-part format: Specific Title,
    Deep Teaching (250-400 words with mechanism, scenario, and common
    mistake), Comparison/Framework (table or process with 4+ entries
    all relevant to the competency), Practitioner Takeaway (specific
    rule of thumb), and Application Challenge (scenario-based question).
    400-600 words total. Must explain at least one mechanism, include
    one decision framework, and identify one common mistake.

# ─── Assessment Evaluation Task ──────────────────────────────────────────────
assessment_eval_task:
  description: >
    Evaluate this learner response against the rubric below.

    ═══════════════════════════════════════════════
    ASSESSMENT CONTEXT
    ═══════════════════════════════════════════════
    Competency being assessed: {competency}
    Scenario presented to learner: {scenario}

    ═══════════════════════════════════════════════
    LEARNER'S RESPONSE
    ═══════════════════════════════════════════════
    {user_response}

    ═══════════════════════════════════════════════
    RUBRIC CRITERIA
    ═══════════════════════════════════════════════
    {rubric_json}

    ═══════════════════════════════════════════════
    SCORING INSTRUCTIONS
    ═══════════════════════════════════════════════
    For each criterion in the rubric:
    1. Read the criterion name and description carefully
    2. Evaluate the learner's response SPECIFICALLY against that criterion
    3. Assign a score from 0-100 using this scale:
       - 90-100 (Exemplary): Mastery with sophisticated insight and application
       - 75-89 (Proficient): Solid understanding with competent application
       - 60-74 (Developing): Partial understanding with notable gaps
       - 40-59 (Beginning): Surface-level response with significant gaps
       - 0-39 (Insufficient): Little to no relevant understanding
    4. Write specific feedback citing evidence from the learner's response
    5. Calculate weighted overall_percent using the criterion weights

    Pass threshold: overall_percent >= 70.0

    RULES:
    - Be fair but rigorous — this is for professional certification
    - Always cite specific evidence from the response
    - Never give scores without justification
    - If response is off-topic or empty, score 0 with explanation
    - Respond ONLY with valid JSON. No markdown, no explanation outside JSON.
  expected_output: >
    A valid JSON object with keys:
    "criteria_scores" (list of objects with "criterion", "score", "feedback"),
    "overall_percent" (float),
    "pass" (bool),
    "summary" (string, 2-4 sentences with strengths and improvement areas).

# ─── Final Assessment Task ───────────────────────────────────────────────────
final_assessment_task:
  description: >
    This is the FINAL comprehensive assessment for the micro-credential on '{topic}'.
    The learner has completed ALL of the following competencies: {all_competencies}.

    ═══════════════════════════════════════════════
    LEARNER'S RESPONSE
    ═══════════════════════════════════════════════
    {user_response}

    ═══════════════════════════════════════════════
    RUBRIC CRITERIA
    ═══════════════════════════════════════════════
    {rubric_json}

    ═══════════════════════════════════════════════
    EVALUATION INSTRUCTIONS
    ═══════════════════════════════════════════════
    This is an INTEGRATIVE assessment — the learner must demonstrate
    understanding across ALL competencies, not just one.

    For each rubric criterion:
    1. Evaluate how well the response demonstrates mastery ACROSS competencies
    2. Check for integration: Does the learner connect ideas between competencies?
    3. Score 0-100 per criterion with specific evidence
    4. Calculate weighted overall_percent

    Additional evaluation dimensions:
    - Cross-competency integration: Can the learner connect concepts?
    - Practical application: Can they apply knowledge to real scenarios?
    - Critical thinking: Do they show analysis beyond surface understanding?

    Pass threshold: overall_percent >= 70.0
    Respond ONLY with valid JSON. No extra text.
  expected_output: >
    A valid JSON object with keys: "criteria_scores" (list), "overall_percent" (float),
    "pass" (bool), "summary" (string). Same format as competency assessment.
