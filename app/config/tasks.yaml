# ─── Pre-Assessment Diagnostic Task ──────────────────────────────────────────
diagonistic_task:
  description: >
    Topic: {topic}
    Active competency: {competencies}
    This is interaction 2 of the competency session.

    Conversation so far:
    {chat_history}

    Request: {user_message}

    Produce exactly 1-2 short applied pre-assessment questions for the active competency.
    The questions must check prior knowledge, not teach the lesson yet.

    Rules:
    - Use realistic scenarios only
    - Target the competency named in {competencies}
    - Keep the tone warm and direct
    - Ask questions that let the backend classify beginner/intermediate/advanced
    - Do not explain the answers
    - Keep the total response under 170 words
  expected_output: >
    A short pre-assessment prompt with 1-2 scenario-based questions for the active competency.
# ─── Level Classification Task ───────────────────────────────────────────────
level_classifing_task:
  description: >
    Analyze the learner's competency-specific pre-assessment conversation for '{topic}'.

    {chat_history}

    Scoring rules:
    1. Infer demonstrated prior knowledge from the learner's answer only.
    2. Classify level as:
       - beginner: weak recall, weak application, needs step-by-step support
       - intermediate: partial understanding, can explain some logic, needs guided application
       - advanced: strong prior knowledge, can reason through tradeoffs and applied use
    3. Return 1-3 weak areas that teaching should address first.

    Respond only with valid JSON.
  expected_output: >
    A valid JSON object with keys "level" and "weak_areas".
# ─── Learning Path Planner Task ──────────────────────────────────────────────
learning_path_planner_task:
  description: >
    Design a 6-part teaching plan for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas: {weak_areas}
    - Context notes: {context_description}

    Build exactly 6 teaching parts for interactions 3-8.
    Each part must teach one concept only.

    Structure:
    1. First concept and intuition
    2. Second concept and first formative checkpoint
    3. Third concept with application
    4. Fourth concept and second formative checkpoint
    5. Fifth concept with deeper practice
    6. Sixth concept and final mastery checkpoint

    Rules:
    - Each item must be under 45 words
    - Each item must be scenario-based and applied
    - Each item must be meaningfully different
    - Output as a numbered list
  expected_output: >
    A numbered list of exactly 6 teaching parts, one concept per part.
# ─── Scenario Content Generation Task ────────────────────────────────────────
senario_generation_task:
  description: >
    Generate comprehensive, MECHANISM-LEVEL study material for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}

    ════════════════════════════════════════════════════════════════
    QUALITY STANDARD
    ════════════════════════════════════════════════════════════════
    This content is for a professional micro-credential program.
    It must go DEEPER than a Wikipedia article or generic blog post.
    Focus on HOW things work (mechanisms), WHEN to use them (decision
    frameworks), and WHAT goes wrong (failure patterns).

    DO NOT fabricate statistics, company names, or research citations.
    Instead, focus on explaining mechanisms, processes, and principles
    deeply and accurately.

    ════════════════════════════════════════════════════════════════
    SECTIONS TO CREATE
    ════════════════════════════════════════════════════════════════

    SECTION 1 — Competency Deep Dive (200-300 words):
    - What this competency is (precise definition specific to {topic})
    - The ORIGIN: What problem or need created this competency?
    - How it works: The underlying mechanism explained step by step
    - Where it applies: 3-4 specific professional contexts where this
      competency is critical
    - What separates a beginner from an expert in this competency
    - Prerequisites (specific skills the learner should already have)

    SECTION 2 — Key Vocabulary (8-10 terms):
    - Term: Clear definition with usage context
    - For each term, add: "Why it matters: [practical significance]"

    SECTION 3 — Core Concepts with Mechanisms (3-4 concepts, 150-200 words each):
    - Concept name
    - The MECHANISM: How it works step by step — the internal process,
      the cause-effect chain, the logic behind each step
    - An analogy that makes the mechanism intuitive
    - "What most people get wrong": The common misconception and the
      correct understanding
    - How this concept connects to the next concept in the sequence

    SECTION 4 — 5 Professional Scenarios (200-300 words each):
    Each scenario must include:
    - A realistic professional context with specific constraints
    - A concrete problem that requires applying {competency}
    - A step-by-step analysis showing how a practitioner would think
      through the problem (the reasoning process, not just the answer)
    - Trade-offs discussed: what you gain and what you sacrifice
    - A challenge question that requires multi-step reasoning

    Difficulty progression:
    - Scenario 1: Foundation — tests understanding of one concept
    - Scenario 2: Application — tests applying a concept to a new situation
    - Scenario 3: Integration — tests combining 2 concepts together
    - Scenario 4: Analysis — tests evaluating trade-offs between approaches
    - Scenario 5: Expert — tests solving a complex problem with ambiguity

    SECTION 5 — Common Failure Patterns & Decision Framework:

    Part A — 5 Failure Patterns:
    For each failure pattern:
    - What practitioners commonly do wrong (specific to {competency})
    - The underlying misconception that causes this mistake
    - The symptom you'll observe when this mistake is made
    - The correct approach and how to verify you're doing it right

    Part B — Decision Framework:
    - A structured guide for making key decisions in {competency}
    - "When to use X vs Y" with clear criteria for each situation
    - Trade-offs expressed as: "You gain A but sacrifice B when..."
    - A diagnostic checklist: "Before you start, verify that..."

    ════════════════════════════════════════════════════════════════
    ANTI-GENERIC RULES
    ════════════════════════════════════════════════════════════════
    - NEVER use filler: "in today's world", "plays a crucial role",
      "is very important", "in various industries"
    - NEVER write content that reads like a Wikipedia summary
    - If a sentence could describe ANY competency by changing the keyword,
      DELETE IT and rewrite with {competency}-specific content
    - Every paragraph must teach something specific about HOW {competency} works
    - DO NOT invent statistics or attribute claims to specific companies
      unless you are confident the information is accurate
  expected_output: >
    Expert-level study material with 5 sections: Deep Dive, Key Vocabulary,
    Core Concepts with Mechanisms, 5 Professional Scenarios, and Failure
    Patterns with Decision Framework. Total 2000-2500 words.

# ─── AI Tutor Teaching Task ──────────────────────────────────────────────────
ai_tutor_task:
  description: >
    You are the AI Tutor for a competency session.

    Session context:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas: {weak_areas}
    - Competency interaction number: {interaction_number}
    - Learning turn: {turn_number}
    - Current concept: {current_subpart}
    - Concept index: {subpart_index} of {total_subparts}
    - Teaching stage: {chat_stage}
    - Bloom level: {bloom_level}
    - Technical competency: {competency_is_technical}
    - Delivery mode: {delivery_mode}
    - Difficulty tier: {difficulty_tier}
    - Support style: {support_style}
    - Feedback style: {feedback_style}
    - Interaction goal: {interaction_goal}
    - Include formative check: {include_formative_check}
    - Revision required: {revision_required}

    Conversation so far:
    {chat_history}

    Learner input:
    {user_message}

    Formative feedback from backend:
    {formative_feedback}

    Study material reference:
    {study_material}

    Response rules:
    - Teach exactly one concept in this interaction
    - Be warm, appreciative, and direct
    - Keep the teaching personalized to the learner's current difficulty tier
    - Give immediate feedback if formative_feedback contains assessment of the learner answer
    - Use markdown headings and bullets
    - Use at least one multimodal teaching artifact: table, steps, comparison, worked example, mini scenario, or formula walkthrough
    - If the competency is technical, stay technically correct but beginner-friendly
    - End with a precise learner action
    - If include_formative_check is yes, end with a section titled **Formative Check** and ask one applied question only

    Required structure:
    1. Title
    2. What this concept means
    3. How it works
    4. Practical example or visual aid
    5. Feedback or rule of thumb
    6. Next learner action
  expected_output: >
    A structured markdown teaching response that teaches one concept, uses a clear visual aid or example, and optionally ends with a **Formative Check** section.
# ─── Assessment Evaluation Task ──────────────────────────────────────────────
assessment_eval_task:
  description: >
    Evaluate the learner response against the provided rubric.

    Competency: {competency}
    Scenario: {scenario}
    Learner response: {user_response}
    Rubric JSON: {rubric_json}

    Rules:
    - Score rigorously against the rubric only
    - Use the rubric weights when calculating the overall percent
    - The pass threshold is 75.0
    - Return JSON only

    Required JSON keys:
    - criteria_scores: list
    - overall_percent: float
    - pass: bool
    - summary: string
  expected_output: >
    A valid JSON object with keys criteria_scores, overall_percent, pass, and summary.
# ─── Final Assessment Task ───────────────────────────────────────────────────
final_assessment_task:
  description: >
    This is the FINAL comprehensive assessment for the micro-credential on '{topic}'.
    The learner has completed ALL of the following competencies: {all_competencies}.

    ═══════════════════════════════════════════════
    LEARNER'S RESPONSE
    ═══════════════════════════════════════════════
    {user_response}

    ═══════════════════════════════════════════════
    RUBRIC CRITERIA
    ═══════════════════════════════════════════════
    {rubric_json}

    ═══════════════════════════════════════════════
    EVALUATION INSTRUCTIONS
    ═══════════════════════════════════════════════
    This is an INTEGRATIVE assessment — the learner must demonstrate
    understanding across ALL competencies, not just one.

    For each rubric criterion:
    1. Evaluate how well the response demonstrates mastery ACROSS competencies
    2. Check for integration: Does the learner connect ideas between competencies?
    3. Score 0-100 per criterion with specific evidence
    4. Calculate weighted overall_percent

    Additional evaluation dimensions:
    - Cross-competency integration: Can the learner connect concepts?
    - Practical application: Can they apply knowledge to real scenarios?
    - Critical thinking: Do they show analysis beyond surface understanding?

    Pass threshold: overall_percent >= 70.0
    Respond ONLY with valid JSON. No extra text.
  expected_output: >
    A valid JSON object with keys: "criteria_scores" (list), "overall_percent" (float),
    "pass" (bool), "summary" (string). Same format as competency assessment.
