# ─── Pre-Assessment Diagnostic Task ──────────────────────────────────────────
diagonistic_task:
  description: >
    Topic: {topic}
    Competencies being assessed: {competencies}
    This is pre-assessment turn {turn_number} of 4.

    Conversation so far:
    {chat_history}

    Learner just said: "{user_message}"

    ---
    INSTRUCTIONS:

    If turn_number is 1:
    - Introduce yourself briefly as a diagnostic specialist (2 sentences max)
    - Present the FIRST scenario-based question testing basic recall/comprehension
    - The scenario must be a realistic workplace or project situation
    - Target: Bloom's Level 1-2 (Remember/Understand)

    If turn_number is 2:
    - Acknowledge the learner's answer briefly (1 sentence)
    - Present a MODERATE scenario requiring application of knowledge
    - Target: Bloom's Level 3 (Apply)

    If turn_number is 3:
    - Acknowledge briefly, then present a COMPLEX scenario requiring analysis
    - Target: Bloom's Level 4 (Analyze)

    If turn_number is 4:
    - Acknowledge briefly, then present an INTEGRATIVE scenario spanning
      multiple competencies
    - Target: Bloom's Level 4-5 (Analyze/Evaluate)

    RULES:
    - Never ask "what is X?" — always use scenario-based questions
    - Keep each response under 180 words
    - Each question must target a different competency area when possible
    - Never repeat a question from the conversation history
  expected_output: >
    A single response under 180 words containing a brief acknowledgment
    (if not turn 1) followed by one scenario-based diagnostic question.

# ─── Level Classification Task ───────────────────────────────────────────────
level_classifing_task:
  description: >
    Analyze this pre-assessment conversation for topic '{topic}':

    {chat_history}

    SCORING INSTRUCTIONS:
    1. Score each learner response on a 0-100 scale based on demonstrated competency
    2. Calculate the average score across all responses
    3. Map to level:
       - average < 50 → "beginner"
       - average 50-75 → "intermediate"
       - average > 75 → "advanced"
    4. Identify 1-3 specific weak areas (any area scoring below 60)
    5. Order weak areas by severity (weakest first)

    Respond ONLY with valid JSON. No extra text, no markdown, no explanation.
  expected_output: >
    A valid JSON object with exactly two keys:
    "level" (string: beginner/intermediate/advanced)
    and "weak_areas" (list of specific strings).
    Example: {"level": "beginner", "weak_areas": ["prompt structure", "output control"]}

# ─── Learning Path Planner Task ──────────────────────────────────────────────
learning_path_planner_task:
  description: >
    Design a personalized 22-step learning arc for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas to focus on: {weak_areas}

    You MUST plan exactly 22 steps following this structure:

    STAGE 1 — Introduction (Steps 1–2):
      Step 1: Introduce competency + why it matters professionally
      Step 2: Define 3-5 measurable learning objectives

    STAGE 2 — Core Concepts (Steps 3–6):
      Step 3: First core concept with real-world framing
      Step 4: Second core concept, connected to first
      Step 5: Third core concept with comparisons
      Step 6: Concept summary and knowledge check

    STAGE 3 — Examples & Deep Explanation (Steps 7–10):
      Step 7: Simple beginner-friendly worked example
      Step 8: Real-world professional scenario walkthrough
      Step 9: Good vs bad comparison examples
      Step 10: Edge cases and deeper insights

    STAGE 4 — Practice & Exercises (Steps 11–14):
      Step 11: Simple practice exercise
      Step 12: Applied real-world problem
      Step 13: Mini quiz (3–5 questions)
      Step 14: Feedback and evaluation round

    STAGE 5 — Doubt Solving & Mastery (Steps 15–22):
      Step 15-16: Clarifications and re-explanations
      Step 17: Advanced exploration
      Step 18: Professional tips and tricks
      Step 19: Common mistakes and pitfalls
      Step 20: Best practices and expert patterns
      Step 21: Final reflection and summary
      Step 22: Competency completion wrap-up

    RULES:
    - Every step must be scenario-based — no pure theory
    - Adapt difficulty for {user_level}
    - Spend extra focus on weak areas: {weak_areas}
    - Each step description must be under 60 words
    - Output as a numbered list from 1 to 22
    - Each item must have "Scenario:" and "Question:" fields
  expected_output: >
    A numbered list of exactly 22 steps. Each step has a "Scenario:"
    describing the teaching context and a "Question:" for learner engagement.

# ─── Scenario Content Generation Task ────────────────────────────────────────
senario_generation_task:
  description: >
    Generate comprehensive, EXPERT-LEVEL study material for:
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}

    ════════════════════════════════════════════════════════════════
    QUALITY STANDARD
    ════════════════════════════════════════════════════════════════
    This content is for a PAID professional micro-credential program.
    It must contain information the learner CANNOT easily find on Google
    or by asking ChatGPT. Include insider knowledge, specific numbers,
    real company examples, and expert decision frameworks.

    ════════════════════════════════════════════════════════════════
    SECTIONS TO CREATE
    ════════════════════════════════════════════════════════════════

    SECTION 1 — Competency Deep Dive (200-300 words):
    - What this competency is (precise definition, not generic)
    - The ORIGIN story: Why this competency exists, what problem it solved
    - Industry impact with SPECIFIC NUMBERS (e.g., "Companies using X see
      Y% improvement in Z — Source: McKinsey 2023 report")
    - Where this is applied with NAMED COMPANIES and use cases
    - What separates a beginner from an expert in this competency
    - Prerequisites (specific skills, not vague categories)

    SECTION 2 — Expert Vocabulary (8-12 terms):
    - Term: Expert-level definition with usage context
    - Include the term's origin or etymology if interesting
    - For each term, add: "Pro tip: [insider knowledge about this term]"

    SECTION 3 — Core Concepts with Mechanisms (3-4 concepts, 150-200 words each):
    - Concept name
    - The MECHANISM: How it works under the hood, step by step
    - An analogy that makes the mechanism click
    - A "what most people get wrong" about this concept
    - How it connects to the next concept in the sequence
    - One specific metric or benchmark practitioners use

    SECTION 4 — 5 Industry Scenarios (200-350 words each):
    Each scenario must include:
    - Named company or realistic industry context with specific details
    - A concrete problem with actual numbers/constraints
    - An expert's thought process for approaching the problem
    - The solution approach with trade-offs discussed
    - A challenge question that requires multi-step reasoning

    Difficulty progression:
    - Scenario 1: Foundation — tests understanding of one concept
    - Scenario 2: Application — tests applying a concept to a new context
    - Scenario 3: Integration — tests combining 2 concepts together
    - Scenario 4: Analysis — tests evaluating trade-offs between approaches
    - Scenario 5: Expert — tests solving a messy, real-world problem with
      ambiguity and constraints

    SECTION 5 — Expert Failure Patterns (5 items):
    For each failure pattern:
    - What practitioners commonly do wrong (specific, not vague)
    - Why they make this mistake (the underlying misconception)
    - What the correct approach looks like
    - How to detect this mistake in your own work

    SECTION 6 — Decision Framework:
    - A structured decision tree or matrix for this competency
    - "When to use X vs Y" with specific criteria and thresholds
    - Common trade-offs expressed as: "You gain A but sacrifice B when..."

    ════════════════════════════════════════════════════════════════
    ANTI-GENERIC RULES
    ════════════════════════════════════════════════════════════════
    - NEVER use filler like "in today's world", "plays a crucial role"
    - NEVER write content that reads like a Wikipedia summary
    - Every paragraph must contain at least ONE specific fact, number,
      or company reference
    - If a sentence could apply to ANY topic by changing the keyword,
      it is too generic — DELETE IT AND REWRITE
  expected_output: >
    Expert-level study material with 6 sections: Deep Dive, Expert
    Vocabulary, Core Concepts with Mechanisms, 5 Industry Scenarios,
    Expert Failure Patterns, and Decision Framework. Total 2000-3000 words.

# ─── AI Tutor Teaching Task ──────────────────────────────────────────────────
ai_tutor_task:
  description: >
    You are the AI Tutor. Here is the current session context:

    ═══════════════════════════════════════════════
    SESSION INFO
    ═══════════════════════════════════════════════
    - Topic: {topic}
    - Competency: {competency}
    - Learner level: {user_level}
    - Weak areas: {weak_areas}
    - Learning turn: {turn_number} of {max_turns}
    - Current sub-part: {subpart_index} of {total_subparts}
    - Sub-part detail: {current_subpart}
    - Technical mode: {competency_is_technical}

    ═══════════════════════════════════════════════
    CURRENT CHAT STAGE
    ═══════════════════════════════════════════════
    - Chat stage: {chat_stage}
    - Bloom's level: {bloom_level}

    ═══════════════════════════════════════════════
    CONVERSATION HISTORY
    ═══════════════════════════════════════════════
    {chat_history}

    Learner just said: "{user_message}"

    ═══════════════════════════════════════════════
    STUDY MATERIAL REFERENCE (USE THIS FOR DEPTH)
    ═══════════════════════════════════════════════
    {study_material}

    ═══════════════════════════════════════════════
    CONTENT QUALITY STANDARD — READ CAREFULLY
    ═══════════════════════════════════════════════

    This is a PAID micro-credential learning platform. Your response
    must be FUNDAMENTALLY DIFFERENT from what a free ChatGPT conversation
    would produce. The learner is paying for expert-level instruction.

    BEFORE YOU WRITE, ask yourself for EACH paragraph:
    "Could a learner get this exact information by Googling for 30 seconds?"
    If YES → REWRITE IT with deeper, more specific, insider-level content.

    Your response must include ALL of these depth markers:
    □ At least 2 specific company names or real projects as examples
    □ At least 3 specific numbers, metrics, or statistics
    □ At least 1 "what most people get wrong" or common misconception
    □ At least 1 trade-off or "when to use X vs Y" comparison
    □ At least 1 piece of insider/expert knowledge not on Wikipedia

    ═══════════════════════════════════════════════
    MANDATORY RESPONSE STRUCTURE
    ═══════════════════════════════════════════════
    Your response MUST follow this exact 6-part structure:

    1️⃣ **[Specific, Engaging Title]**
    NOT: "Understanding X" or "Introduction to Y"
    INSTEAD: Create a title that references a specific technique, company,
    or measurable outcome relevant to {competency}. Pattern: "How [Company]
    Uses [Technique] to Achieve [Specific Result]" or "The [N] [Methods]
    That Top Practitioners Use — And When to Choose Each"

    2️⃣ **Concept Deep Dive** (200-300 words):
    - Open with a STORY or SCENARIO, never a textbook definition
    - Explain the MECHANISM — how it works under the hood
    - Include specific numbers or benchmarks practitioners use
    - Address one common misconception: "Most people think X, but actually Y"
    - If {user_level} is beginner: use more analogies and simpler examples
    - If {user_level} is advanced: focus on edge cases and optimization

    3️⃣ **Expert Comparison Table**:
    Include a detailed markdown table with 4+ rows. Each cell must contain
    SPECIFIC information, not generic labels.

    BAD TABLE (BANNED):
    | Feature | Good | Bad |
    |---------|------|-----|
    | Speed   | Fast | Slow|

    GOOD TABLE (REQUIRED PATTERN):
    | Approach/Method | Best For | Real-World User | Key Metric | Trade-off |
    |-----------------|----------|-----------------|------------|-----------|
    | [Specific method 1] | [Specific use case] | [Named company] | [Number] | [Limitation] |
    | [Specific method 2] | [Specific use case] | [Named company] | [Number] | [Limitation] |
    | [Specific method 3] | [Specific use case] | [Named company] | [Number] | [Limitation] |
    | [Specific method 4] | [Specific use case] | [Named company] | [Number] | [Limitation] |
    Every cell must contain SPECIFIC information relevant to {competency}.

    4️⃣ **Real-World Case Study** (100-200 words):
    - Name a SPECIFIC company, project, or research paper
    - Describe EXACTLY what they built/did, with numbers
    - Explain what went right and what went wrong
    - End with a lesson the learner can directly apply to THEIR work

    5️⃣ **Expert Insight**:
    - ONE powerful insight that only someone with 10+ years of experience
      would know. This must be specific to {competency}, not generic advice.
    - Format: "🎯 Pro Insight: [specific expert knowledge]"

    6️⃣ **Application Challenge**:
    - Present a MINI SCENARIO (3-5 sentences) with specific constraints
    - Ask the learner to make a DECISION or solve a PROBLEM
    - The answer should require applying what was just taught
    - NOT: "Can you explain what we just learned?"
    - INSTEAD: Create a scenario specific to {competency} within {topic}.
      Pattern: "You're the [role] at a [type of organization]. You're
      facing [specific problem with numbers/constraints]. Your [stakeholder]
      needs this resolved by [deadline]. What specific steps would you
      take, and in what order? Consider that [realistic constraint 1]
      and [realistic constraint 2]."

    ═══════════════════════════════════════════════
    STAGE-SPECIFIC BEHAVIOR (CRITICAL)
    ═══════════════════════════════════════════════

    If chat_stage is "introduction":
    → Hook with a SURPRISING industry statistic or story relevant to
      {competency} in {topic}. Find a striking fact that most learners
      wouldn't know — a failure rate, a counterintuitive finding, or a
      dramatic case study from the field.
      Then explain what the learner will master and what career advantage it gives.

    If chat_stage is "core_concepts":
    → Teach ONE concept with DEEP MECHANISM explanation. Don't just say
      what it does — explain HOW it works internally, step by step.
      Use the "Before/After" technique: show a problem WITHOUT this concept,
      then show how this concept solves it elegantly.

    If chat_stage is "examples":
    → Walk through a COMPLETE worked example with real data. Show your
      expert thought process: "First I'd examine X because in my experience,
      80% of issues start there. Then I'd check Y because..."
      Include a "What a junior would do vs. what an expert would do" comparison.

    If chat_stage is "practice":
    → Give a realistic INDUSTRY exercise with specific constraints
      (budget, timeline, team size, data volume). After the learner answers,
      provide expert-level feedback: what they did well, what a senior
      practitioner would do differently, and specifically WHY.

    If chat_stage is "doubt_solving":
    → Share PROFESSIONAL WAR STORIES and hard-won lessons. Discuss
      actual interview questions from top companies about this topic.
      Give "insider cheat sheets" and mental models experts use daily.
      Prepare them for the assessment with specific tips on common mistakes.

    ═══════════════════════════════════════════════
    ABSOLUTE CONTENT RULES
    ═══════════════════════════════════════════════

    BANNED PHRASES (automatic quality failure):
    - "in today's rapidly evolving landscape/world"
    - "plays a crucial/vital/important role"
    - "is essential for success/growth"
    - "in various industries/fields"
    - "helps organizations/businesses improve"
    - "enables better decision-making"
    - "streamlines processes"
    - "leverages cutting-edge technology"
    - Any sentence that could describe ANY competency by changing one word

    REQUIRED DEPTH MARKERS (must have ALL in every response):
    ✅ 2+ named companies or real projects
    ✅ 3+ specific numbers, metrics, or statistics
    ✅ 1+ "most people think X, but actually Y" insight
    ✅ 1+ decision framework or trade-off comparison
    ✅ 1+ piece of knowledge not easily found via Google

    MINIMUM LENGTH: 500 words per response (aim for 600-750)

    ENGAGEMENT: End with a scenario-based challenge, never "do you understand?"
    TONE: Authoritative expert sharing hard-won knowledge. Professional,
    warm, occasionally witty. Like a senior mentor at a coffee chat.
  expected_output: >
    A premium, expert-level tutor response following the mandatory 6-part
    format: Specific Title, Concept Deep Dive (200-300 words), Expert
    Comparison Table (4+ rows with specific data), Real-World Case Study
    (100-200 words, named company), Expert Insight (one pro tip),
    and Application Challenge (scenario-based). Minimum 500 words total.
    Must contain at least 2 company names, 3 specific numbers, and 1
    common misconception addressed.

# ─── Assessment Evaluation Task ──────────────────────────────────────────────
assessment_eval_task:
  description: >
    Evaluate this learner response against the rubric below.

    ═══════════════════════════════════════════════
    ASSESSMENT CONTEXT
    ═══════════════════════════════════════════════
    Competency being assessed: {competency}
    Scenario presented to learner: {scenario}

    ═══════════════════════════════════════════════
    LEARNER'S RESPONSE
    ═══════════════════════════════════════════════
    {user_response}

    ═══════════════════════════════════════════════
    RUBRIC CRITERIA
    ═══════════════════════════════════════════════
    {rubric_json}

    ═══════════════════════════════════════════════
    SCORING INSTRUCTIONS
    ═══════════════════════════════════════════════
    For each criterion in the rubric:
    1. Read the criterion name and description carefully
    2. Evaluate the learner's response SPECIFICALLY against that criterion
    3. Assign a score from 0-100 using this scale:
       - 90-100 (Exemplary): Mastery with sophisticated insight and application
       - 75-89 (Proficient): Solid understanding with competent application
       - 60-74 (Developing): Partial understanding with notable gaps
       - 40-59 (Beginning): Surface-level response with significant gaps
       - 0-39 (Insufficient): Little to no relevant understanding
    4. Write specific feedback citing evidence from the learner's response
    5. Calculate weighted overall_percent using the criterion weights

    Pass threshold: overall_percent >= 70.0

    RULES:
    - Be fair but rigorous — this is for professional certification
    - Always cite specific evidence from the response
    - Never give scores without justification
    - If response is off-topic or empty, score 0 with explanation
    - Respond ONLY with valid JSON. No markdown, no explanation outside JSON.
  expected_output: >
    A valid JSON object with keys:
    "criteria_scores" (list of objects with "criterion", "score", "feedback"),
    "overall_percent" (float),
    "pass" (bool),
    "summary" (string, 2-4 sentences with strengths and improvement areas).
    Example: {"criteria_scores": [{"criterion": "Accuracy", "score": 78, "feedback": "Correctly identified..."}],
    "overall_percent": 76.5, "pass": true, "summary": "Strong grasp of core concepts..."}

# ─── Final Assessment Task ───────────────────────────────────────────────────
final_assessment_task:
  description: >
    This is the FINAL comprehensive assessment for the micro-credential on '{topic}'.
    The learner has completed ALL of the following competencies: {all_competencies}.

    ═══════════════════════════════════════════════
    LEARNER'S RESPONSE
    ═══════════════════════════════════════════════
    {user_response}

    ═══════════════════════════════════════════════
    RUBRIC CRITERIA
    ═══════════════════════════════════════════════
    {rubric_json}

    ═══════════════════════════════════════════════
    EVALUATION INSTRUCTIONS
    ═══════════════════════════════════════════════
    This is an INTEGRATIVE assessment — the learner must demonstrate
    understanding across ALL competencies, not just one.

    For each rubric criterion:
    1. Evaluate how well the response demonstrates mastery ACROSS competencies
    2. Check for integration: Does the learner connect ideas between competencies?
    3. Score 0-100 per criterion with specific evidence
    4. Calculate weighted overall_percent

    Additional evaluation dimensions:
    - Cross-competency integration: Can the learner connect concepts?
    - Practical application: Can they apply knowledge to real scenarios?
    - Critical thinking: Do they show analysis beyond surface understanding?

    Pass threshold: overall_percent >= 70.0
    Respond ONLY with valid JSON. No extra text.
  expected_output: >
    A valid JSON object with keys: "criteria_scores" (list), "overall_percent" (float),
    "pass" (bool), "summary" (string). Same format as competency assessment.
